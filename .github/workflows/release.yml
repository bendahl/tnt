name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create and upload assets to releases

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      # currently, only Linux amd64 is supported by the build
      - name: Build
        run: |
          make all
          mv tnt tnt-linux-amd64

      - name: Calculate and Save Checksums
        run: |
          sha256sum tnt-linux-amd64 >> checksums.txt

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" --notes-file CHANGELOG.md tnt-linux-amd64 checksums.txt
